# Render Blueprint for EcoRoute full-stack deployment
# See docs/DEPLOYMENT.md or cloud_deployment_guide.md for more info.
databases:
  - name: ecoroute-db
    databaseName: ecoroute
    user: ecoroute
    plan: free

services:
  # 1. FastAPI Backend
  - type: web
    name: ecoroute-backend
    env: docker
    dockerfilePath: docker/Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoroute-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*" # Can be restricted to frontend URL post-deployment

  # 3. React Frontend (Nginx-served)
  - type: web
    name: ecoroute-frontend
    env: docker
    dockerfilePath: docker/Dockerfile.frontend
    dockerContext: .
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://ecoroute-backend.onrender.com/api/v1" # Update this to your deployed backend service URL
