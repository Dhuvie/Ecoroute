# EcoRoute - Full Stack Docker Compose
# Usage: docker compose up --build

version: "3.9"

services:
  # ------------------------------------------------------------------ #
  # PostgreSQL database (optional - falls back to SQLite if not used)
  # ------------------------------------------------------------------ #
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecoroute
      POSTGRES_USER: ecoroute
      POSTGRES_PASSWORD: ecoroute_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoroute"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  # FastAPI backend
  # ------------------------------------------------------------------ #
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ecoroute-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ecoroute:ecoroute_secret@db:5432/ecoroute
      - DEBUG=false
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/ml/models
      - ./data:/app/data
    restart: unless-stopped

  # ------------------------------------------------------------------ #
  # React frontend (nginx-served)
  # ------------------------------------------------------------------ #
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ecoroute-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
