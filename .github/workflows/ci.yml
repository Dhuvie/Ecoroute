name: EcoRoute CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ------------------------------------------------------------------ #
  # Backend tests
  # ------------------------------------------------------------------ #
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run smoke tests
        run: |
          cd .. && python -m tests.test_api

  # ------------------------------------------------------------------ #
  # ML pipeline test (quick mode)
  # ------------------------------------------------------------------ #
  ml-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn xgboost lightgbm catboost optuna joblib pandas numpy
      - name: Generate quick dataset
        run: python -m ml.data_generation -n 1000 -o data/raw
      - name: Train (quick)
        run: python -m ml.train --quick --trials 3 --top-k 1

  # ------------------------------------------------------------------ #
  # Frontend build
  # ------------------------------------------------------------------ #
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"

  # ------------------------------------------------------------------ #
  # Docker build
  # ------------------------------------------------------------------ #
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: ecoroute-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: ecoroute-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
